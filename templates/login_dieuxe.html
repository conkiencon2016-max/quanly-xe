<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Đăng nhập - Điều xe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:"Segoe UI",Arial;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(270deg,#1e3a8a,#2563eb,#1e40af);
    background-size:600% 600%;
    animation:bgMove 12s ease infinite;
}

/* ANIMATION BG */
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* CARD */
.card{
    width:380px;
    background:#fff;
    padding:35px;
    border-radius:18px;
    box-shadow:0 25px 60px rgba(0,0,0,0.25);
    text-align:center;
    position:relative;
}

/* DARK MODE */
body.dark{
    background:#0f172a;
}
body.dark .card{
    background:#1e293b;
    color:#fff;
}
body.dark input{
    background:#0f172a;
    color:#fff;
    border:1px solid #334155;
}

/* LOGO */
.logo{
    width:80px;
    margin-bottom:10px;
}

/* TITLE */
h2{margin-bottom:5px}
.sub{
    font-size:13px;
    color:#64748b;
    margin-bottom:20px;
}

/* INPUT */
.input-group{
    text-align:left;
    margin-bottom:15px;
    position:relative;
}

.input-group label{
    font-size:13px;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:1px solid #cbd5e1;
    outline:none;
}

/* SHOW PASSWORD */
.toggle-pass{
    position:absolute;
    right:10px;
    top:38px;
    cursor:pointer;
    font-size:14px;
    color:#64748b;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#1d4ed8;
}

/* REMEMBER */
.remember{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    margin-top:10px;
}

/* ERROR */
.error{
    background:#fee2e2;
    color:#b91c1c;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    display:none;
}

/* DARK TOGGLE */
.dark-toggle{
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
}

/* QR LOGIN */
.qr-box{
    margin-top:15px;
    padding:10px;
    border:1px dashed #cbd5e1;
    border-radius:10px;
    font-size:13px;
}

/* FOOTER */
.footer{
    margin-top:15px;
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="card">

    <div class="dark-toggle" onclick="toggleDark()">🌙</div>

    <img src="/static/LOGO_DIEUXE.png" class="logo">
    <h2>ĐIỀU XE</h2>
    <div class="sub">Hệ thống quản lý điều phối xe</div>

    <!-- ERROR -->
    <div class="error" id="errorBox">Sai tài khoản hoặc mật khẩu</div>

    <form method="post" onsubmit="return validateLogin()">

        <div class="input-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" name="password" required>
            <span class="toggle-pass" onclick="togglePass()">👁</span>
        </div>

        <div class="remember">
            <label><input type="checkbox" id="remember"> Ghi nhớ</label>
            <span style="cursor:pointer">Quên mật khẩu?</span>
        </div>

        <button type="submit">Đăng nhập</button>
    </form>

    <!-- QR LOGIN -->
    <div class="qr-box">
        🔳 Đăng nhập nhanh (Zalo / Telegram)<br>
        <small>Quét QR để đăng nhập</small>
    </div>

    <div class="footer">© 2026 Điều xe nội bộ</div>

</div>

<script>
/* SHOW PASSWORD */
function togglePass(){
    let p = document.getElementById("password");
    p.type = (p.type === "password") ? "text" : "password";
}

/* DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* VALIDATE + FAKE ERROR DEMO */
function validateLogin(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "" || pass === ""){
        showError("Vui lòng nhập đầy đủ thông tin");
        return false;
    }

    return true;
}

/* SHOW ERROR */
function showError(msg){
    let box = document.getElementById("errorBox");
    box.innerText = msg;
    box.style.display = "block";
}

/* REMEMBER LOGIN */
window.onload = function(){
    let saved = localStorage.getItem("username");
    if(saved){
        document.getElementById("username").value = saved;
        document.getElementById("remember").checked = true;
    }
}

document.getElementById("remember").addEventListener("change", function(){
    if(this.checked){
        localStorage.setItem("username", document.getElementById("username").value);
    }else{
        localStorage.removeItem("username");
    }
});
</script>

</body>
</html>
