<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Đăng nhập - Hệ thống Điều xe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CARD */
.card{
    background:#ffffff;
    width:380px;
    padding:35px 30px;
    border-radius:18px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    text-align:center;
    animation: fadeIn 0.6s ease;
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* LOGO */
.logo{
    width:90px;
    margin-bottom:10px;
}

/* TITLE */
h2{
    margin-bottom:5px;
    color:#1e293b;
}

.sub{
    font-size:13px;
    color:#64748b;
    margin-bottom:20px;
}

/* INPUT */
.input-group{
    text-align:left;
    margin-bottom:15px;
}

.input-group label{
    font-size:13px;
    color:#475569;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    outline:none;
    transition:0.2s;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 2px rgba(37,99,235,0.2);
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:#fff;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:linear-gradient(135deg,#1d4ed8,#1e40af);
    transform:translateY(-1px);
}

/* FOOTER */
.footer{
    margin-top:15px;
    font-size:12px;
    color:#94a3b8;
}

/* MOBILE */
@media(max-width:420px){
    .card{
        width:90%;
        padding:25px;
    }
}
</style>
</head>

<body>

<div class="card">
    <img src="/static/LOGO_DIEUXE.png" class="logo">

    <h2>ĐIỀU XE</h2>
    <div class="sub">Hệ thống quản lý & điều phối xe</div>

    <form method="post">
        <div class="input-group">
            <label>Tên đăng nhập</label>
            <input type="text" name="username" placeholder="Nhập username" required>
        </div>

        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" placeholder="Nhập mật khẩu" required>
        </div>

        <button type="submit">Đăng nhập</button>
    </form>

    <div class="footer">
        © 2026 Điều xe nội bộ
    </div>
</div>

</body>
</html>
