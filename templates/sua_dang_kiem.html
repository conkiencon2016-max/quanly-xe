<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Sửa đăng kiểm</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f3f4f6;
}
.card-form{
    max-width:800px;
    margin:40px auto;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
.header-title{
    font-weight:700;
    color:#0F3D5E;
}
</style>
</head>

<body>

<div class="card card-form p-4">

    <h4 class="header-title mb-4">🛠️ Sửa thông tin đăng kiểm</h4>

    <form method="POST">

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Số đăng ký</label>
                <input type="text"
                       name="so_dang_ky"
                       value="{{ data.so_dang_ky }}"
                       class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Loại</label>
                <input type="text"
                       name="loai"
                       value="{{ data.loai }}"
                       class="form-control">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Ngày đăng ký</label>
                <input type="date"
                       name="ngay_dang_ky"
                       value="{{ data.ngay_dang_ky }}"
                       class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Ngày hết hạn</label>
                <input type="date"
                       name="ngay_het_han"
                       value="{{ data.ngay_het_han }}"
                       class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Trung tâm đăng kiểm</label>
            <input type="text"
                   name="trung_tam"
                   value="{{ data.trung_tam }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Chi phí (VNĐ)</label>
            <input type="text"
                   name="chi_phi"
                   value="{{ data.chi_phi }}"
                   class="form-control"
                   oninput="formatCurrency(this)">
        </div>

        <div class="mb-4">
            <label class="form-label">Ghi chú</label>
            <textarea name="ghi_chu"
                      class="form-control"
                      rows="2">{{ data.ghi_chu }}</textarea>
        </div>

        <div class="d-flex justify-content-between">
            <a href="/lich-su-dang-kiem" class="btn btn-secondary">
                ← Quay lại
            </a>

            <button type="submit" class="btn btn-primary">
                💾 Cập nhật
            </button>
        </div>

    </form>

</div>

<script>
function formatCurrency(input) {
    let value = input.value.replace(/\D/g,'');
    input.value = new Intl.NumberFormat('vi-VN').format(value);
}
</script>

</body>
</html>
