<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Sửa tài xế</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family:"Segoe UI",Arial,sans-serif;
    background-image:url("/static/10.jpg");
    background-size:cover;
    background-attachment:fixed;
    margin:0;
}

.overlay{ padding:30px; }

.card{
    max-width:520px;
    margin:auto;
    background:rgba(255,255,255,0.65);
    backdrop-filter: blur(10px);
    border-radius:16px;
    padding:20px;
}

h2{
    text-align:center;
    color:#1E3A8A;
    margin-top:0;
}

.form-group{
    margin-bottom:14px;
}

label{
    font-weight:600;
    font-size:13px;
    display:block;
    margin-bottom:4px;
}

input{
    width:100%;
    height:36px;
    padding:6px 8px;
    border-radius:6px;
    border:1px solid rgba(0,0,0,0.25);
}

.actions{
    display:flex;
    gap:10px;
    margin-top:16px;
}

.btn-save{
    flex:1;
    background:#2563EB;
    color:#fff;
    border:none;
    border-radius:8px;
    height:38px;
    font-weight:600;
    cursor:pointer;
}

.btn-back{
    flex:1;
    background:#94A3B8;
    color:#fff;
    border:none;
    border-radius:8px;
    height:38px;
    font-weight:600;
    cursor:pointer;
    text-align:center;
    line-height:38px;
    text-decoration:none;
}
</style>
</head>

<body>
<div class="overlay">

<div class="card">
<h2>SỬA THÔNG TIN TÀI XẾ</h2>

<form method="post">
    <div class="form-group">
        <label>Họ và tên</label>
        <input type="text" name="name" value="{{ driver.name }}" required>
    </div>

    <div class="form-group">
        <label>Số điện thoại</label>
        <input type="text" name="phone" value="{{ driver.phone }}">
    </div>

    <div class="form-group">
        <label>Địa chỉ</label>
        <input type="text" name="address" value="{{ driver.address }}">
    </div>

    <div class="actions">
        <button type="submit" class="btn-save">💾 Lưu</button>
        <a href="/quan-ly-tai-xe" class="btn-back">↩ Quay lại</a>
    </div>
</form>

</div>
</div>
</body>
</html>
