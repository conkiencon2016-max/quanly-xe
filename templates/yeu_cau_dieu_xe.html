<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Yêu cầu điều xe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="overlay">

<a href="/" class="back-link">⬅ Trang chủ</a>

<div class="header">
    <h2>📝 YÊU CẦU ĐIỀU XE</h2>
</div>

<!-- FORM -->
<div class="card">

<form method="POST">

<div class="filter-bar">

    <div class="filter-group">
        <label>Người yêu cầu</label>
        <input name="nguoi_yeu_cau" required>
    </div>

    <div class="filter-group">
        <label>Chức vụ</label>
        <input name="chuc_vu">
    </div>

    <div class="filter-group">
        <label>Số khách</label>
        <input type="number" name="so_hanh_khach">
    </div>

    <div class="filter-group">
        <label>Ngày đi</label>
        <input type="datetime-local" name="ngay_di">
    </div>

    <div class="filter-group">
        <label>Ngày về</label>
        <input type="datetime-local" name="ngay_ve">
    </div>

</div>

<div class="filter-bar">

    <div class="filter-group" style="flex:2">
        <label>Mục đích</label>
        <input name="muc_dich">
    </div>

    <div class="filter-group">
        <label>Điểm đón</label>
        <input name="diem_don">
    </div>

    <div class="filter-group">
        <label>Điểm đến</label>
        <input name="diem_den">
    </div>

</div>

<button class="btn-add">➕ Gửi yêu cầu</button>

</form>

</div>

<!-- DANH SÁCH -->
<div class="card">

<h3>📋 Danh sách yêu cầu</h3>

<table>
<thead>
<tr>
    <th>#</th>
    <th>Người</th>
    <th>Trạng thái</th>
    <th>Điểm</th>
    <th>Thời gian</th>
</tr>
</thead>

<tbody>
{% for r in data %}
<tr>
    <td>{{ loop.index }}</td>
    <td>{{ r.nguoi_yeu_cau }}</td>

    <td>
        {% if r.trang_thai == "cho_duyet" %}
        <span style="color:#F59E0B;font-weight:600">🟡 Chờ duyệt</span>
        {% else %}
        <span style="color:#16A34A;font-weight:600">🟢 Đã duyệt</span>
        {% endif %}
    </td>

    <td>{{ r.diem_don }} → {{ r.diem_den }}</td>
    <td>{{ r.ngay_di }}</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>

</div>
</body>
</html>
