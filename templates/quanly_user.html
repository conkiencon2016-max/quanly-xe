{% extends "home.html" %}
{% block content %}

<div class="card p-4 card-dashboard">

<h4 class="mb-3">👤 Quản lý người dùng</h4>

<form method="post" action="/quan-ly-user" class="row g-3 mb-4">

<div class="col-md-4">
<label>Tên đăng nhập</label>
<input name="username" required class="form-control">
</div>

<div class="col-md-4">
<label>Vai trò</label>

<select name="role" class="form-control">

<option value="user">Lãnh đạo</option>
<option value="viewer">Chuyên viên</option>
<option value="driver">Tài xế</option>

</select>

</div>

<div class="col-md-4 d-flex align-items-end">
<button type="submit" class="btn btn-success w-100">
<i class="bi bi-plus-circle"></i> Thêm người dùng
</button>
</div>

</form>

<table class="table table-striped table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Username</th>
<th>Role</th>
<th>Thao tác</th>
</tr>

</thead>

<tbody>

{% for row in data %}

<tr>

<td>{{row.id}}</td>
<td>{{row.username}}</td>
<td>{{row.role}}</td>

<td>

<a href="/sua_user/{{row.id}}" class="btn btn-sm btn-warning">
<i class="bi bi-pencil"></i>
</a>

<a href="/xoa_user/{{row.id}}"
class="btn btn-sm btn-danger"
onclick="return confirm('Xóa user này?')">

<i class="bi bi-trash"></i>

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
