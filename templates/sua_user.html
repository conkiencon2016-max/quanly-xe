{% extends "home.html" %}
{% block content %}

<div class="card p-4">

<h4>✏️ Sửa người dùng</h4>

<form method="post" class="row g-3">

<div class="col-md-6">
<label>Username</label>
<input name="username" value="{{row.username}}" class="form-control" required>
</div>

<div class="col-md-6">
<label>Role</label>
<select name="role" class="form-control">
<option value="admin" {% if row.role=="admin" %}selected{% endif %}>Admin</option>
<option value="user" {% if row.role=="user" %}selected{% endif %}>Lãnh đạo</option>
<option value="viewer" {% if row.role=="viewer" %}selected{% endif %}>Chuyên viên</option>
<option value="driver" {% if row.role=="driver" %}selected{% endif %}>Tài xế</option>
</select>
</div>

<div class="col-md-6">
<label>Tài xế</label>
<select name="driver_id" class="form-control">
<option value="">-- Không gán --</option>
{% for d in drivers %}
<option value="{{d.id}}" {% if row.driver_id==d.id %}selected{% endif %}>
{{d.name}}
</option>
{% endfor %}
</select>
</div>

<div class="col-md-6">
<label>Zalo ID</label>
<input name="zalo_user_id" value="{{row.zalo_user_id}}" class="form-control">
</div>

<div class="col-md-6">
<label>Telegram ID</label>
<input name="telegram_chat_id" value="{{row.telegram_chat_id}}" class="form-control">
</div>

<div class="col-12 text-end">
<button class="btn btn-warning">💾 Lưu</button>
</div>

</form>

</div>

{% endblock %}
