{% extends "layout.html" %}
{% block content %}

<div class="card shadow-lg p-4 card-dashboard">

<div class="d-flex justify-content-between align-items-center mb-4">

<h4 class="mb-0">
<i class="bi bi-pencil-square text-warning"></i>
Sửa thông tin user
</h4>

<a href="/quanly_user" class="btn btn-secondary btn-sm">
<i class="bi bi-arrow-left"></i> Quay lại
</a>

</div>

<form method="post" class="row g-3">

<div class="col-md-6">

<label class="form-label fw-semibold">
Username
</label>

<input type="text"
name="username"
value="{{row.username}}"
class="form-control"
required>

</div>

<div class="col-md-6">

<label class="form-label fw-semibold">
Vai trò
</label>

<select name="role" class="form-control">

<option value="user"
{% if row.role=="user" %}selected{% endif %}>
Lãnh đạo
</option>

<option value="viewer"
{% if row.role=="viewer" %}selected{% endif %}>
Chuyên viên
</option>
<option value="driver"
{% if row.role=="driver" %}selected{% endif %}>
Tài xế
</option>

</select>

</div>

<div class="col-12 text-end mt-4">

<button type="submit"
class="btn btn-warning px-4">

<i class="bi bi-save"></i>
Lưu thay đổi

</button>

</div>

</form>

</div>

{% endblock %}
