<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Thêm bảo dưỡng</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="overlay">

<a href="/lich-su-bao-duong" class="back-link">⬅ Quay lại</a>

<div class="header">
    <h2>THÊM BẢO DƯỠNG</h2>
</div>

<div class="card">

<form method="post">

<div class="form-grid">

<div class="form-group">
<label>Xe</label>
<select name="vehicle_id" required>
    {% for v in vehicles %}
    <option value="{{ v.id }}">{{ v.plate }}</option>
    {% endfor %}
</select>
</div>

<div class="form-group">
<label>Loại bảo dưỡng</label>
<input type="text" name="loai" required>
</div>

<div class="form-group">
<label>Nội dung</label>
<input type="text" name="noi_dung">
</div>

<div class="form-group">
<label>Ngày thực hiện</label>
<input type="date" name="ngay_thuc_hien">
</div>

<div class="form-group">
<label>Ngày hoàn thành</label>
<input type="date" name="ngay_hoan_thanh">
</div>

<div class="form-group">
<label>Trạng thái</label>
<select name="trang_thai">
    <option value="dang_bao_duong">Đang bảo dưỡng</option>
    <option value="hoan_thanh">Hoàn thành</option>
</select>
</div>

<div class="form-group">
<label>Đơn vị</label>
<input type="text" name="don_vi">
</div>

<div class="form-group">
<label>Chi phí</label>
<input type="number" name="chi_phi" min="0" step="10000000000">
</div>
<div class="form-group">
<label>KM tại thời điểm bảo dưỡng</label>
<input type="number" name="km_tai_thoi_diem" min="0" required>
</div>

<div class="form-group">
<label>Ghi chú kỹ thuật</label>
<input type="text" name="ghi_chu">
</div>
<button class="btn-add" type="submit">💾 Lưu</button>

</div>

</form>

</div>

</div>
</body>
</html>
