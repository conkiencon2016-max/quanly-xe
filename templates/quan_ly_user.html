{% extends "layout.html" %}
{% block content %}

<div class="card p-4 card-dashboard">

<h4 class="mb-3">👤 Quản lý người dùng</h4>

<form method="post" action="/quan-ly-user" class="row g-3 mb-4">

<div class="col-md-2">
<input name="username" class="form-control" placeholder="Username" required>
</div>

<div class="col-md-2">
<input type="password" name="password" class="form-control" placeholder="Mật khẩu" required>
</div>

<div class="col-md-2">
<select name="role" class="form-control">
<option value="admin">Admin</option>
<option value="user">Lãnh đạo</option>
<option value="viewer">Chuyên viên</option>
<option value="driver">Tài xế</option>
</select>
</div>

<div class="col-md-2">
<select name="driver_id" class="form-control">
<option value="">-- Tài xế --</option>
{% for d in drivers %}
<option value="{{d.id}}">{{d.name}}</option>
{% endfor %}
</select>
</div>

<div class="col-md-2">
<input name="zalo_user_id" class="form-control" placeholder="Zalo ID">
</div>

<div class="col-md-2">
<input name="telegram_chat_id" class="form-control" placeholder="Telegram ID">
</div>

<div class="col-md-12 text-end">
<button class="btn btn-success">➕ Thêm user</button>
</div>

</form>

<table class="table table-bordered table-hover">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Username</th>
<th>Role</th>
<th>Tài xế</th>
<th>Zalo</th>
<th>Telegram</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody>

{% for u in users %}
<tr>
<td>{{u.id}}</td>
<td>{{u.username}}</td>
<td>{{u.role}}</td>
<td>{{u.name}}</td>
<td>{{u.zalo_user_id}}</td>
<td>{{u.telegram_chat_id}}</td>

<td>
<a href="/sua-user/{{u.id}}" class="btn btn-warning btn-sm">✏️</a>
<a href="/xoa-user/{{u.id}}" class="btn btn-danger btn-sm"
onclick="return confirm('Xóa user?')">🗑</a>
</td>

</tr>
{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
